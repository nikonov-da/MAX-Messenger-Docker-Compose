services:
  max-messenger:
    image: max-messenger:latest
    container_name: max_messenger
    network_mode: host
    privileged: false
    restart: "no"
    security_opt:
      - no-new-privileges:true
      - seccomp:${PWD}/bin/seccomp-max.json
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=128M
      - /run:rw,noexec,nosuid,size=64M
    cap_add:
      - NET_ADMIN
      - NET_RAW
    cap_drop:
      - ALL
    environment:
      DISPLAY: ":0"
      QT_QPA_PLATFORM: "xcb"
      QT_X11_NO_MITSHM: "1"
      LIBGL_ALWAYS_SOFTWARE: "0"
      ELECTRON_NO_SANDBOX: "1"
      SECRETS_SERVICE_IGNORE: "1"
      NO_AT_BRIDGE: "1"
      GDK_BACKEND: "x11"
      HOME: "/tmp"
      NVIDIA_VISIBLE_DEVICES: "all"
      NVIDIA_DRIVER_CAPABILITIES: "all"
      DBUS_SESSION_BUS_ADDRESS: "autolaunch:"
      XDG_RUNTIME_DIR: "/run/user/1000"
      LC_ALL: "ru_RU.UTF-8"
      LANG: "ru_RU.UTF-8"
      DBUS_FATAL_WARNINGS: "0"
      GSETTINGS_BACKEND: "memory"
      QT_LOGGING_RULES: "qt.qpa.*=false"
    volumes:
      - /tmp/.X11-unix/X0:/tmp/.X11-unix/X0:rw
      - /run/user/1000/bus:/run/user/1000/bus:ro
      - ${HOME}/.max:/root/.config/max:rw
      - ./logs:/root/logs:rw
      - /etc/machine-id:/etc/machine-id:ro
      - /run/user/1000/pulse:/run/user/1000/pulse:ro
    devices:
      - /dev/dri:/dev/dri
      - /dev/snd:/dev/snd
    group_add:
      - audio
      - video
    # Добавляем GPU конфигурацию
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu, compute, utility]
    healthcheck:
      test: ["CMD-SHELL", "pidof max || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
