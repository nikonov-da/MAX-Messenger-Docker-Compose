# docker-compose.yml для MAX Messenger (изолированная сеть)

networks:
  max_isolated_network:
    external: true
    name: max_isolated_network

services:
  max-messenger:
    image: max-messenger:latest
    container_name: max_messenger

    networks:
      max_isolated_network:
        ipv4_address: 172.20.0.100

    security_opt:
      - no-new-privileges:true
      - seccomp:${PWD}/bin/seccomp-max.json
      # Добавляем SELinux метку для X11
      - label=type:container_t

    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=128M
      - /run:rw,noexec,nosuid,size=64M

    cap_add:
      - NET_ADMIN
      - NET_RAW
      - IPC_LOCK
    cap_drop:
      - ALL

    environment:
      - DISPLAY=:0
      - QT_QPA_PLATFORM=xcb
      - QT_X11_NO_MITSHM=1
      - LIBGL_ALWAYS_SOFTWARE=0
      - ELECTRON_NO_SANDBOX=1
      - SECRETS_SERVICE_IGNORE=1
      - NO_AT_BRIDGE=1
      - GDK_BACKEND=x11
      - HOME=/tmp
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
      - DBUS_SESSION_BUS_ADDRESS=unix:path=/run/user/1000/bus
      - XDG_RUNTIME_DIR=/run/user/1000
      - LC_ALL=ru_RU.UTF-8
      - LANG=ru_RU.UTF-8
      - DBUS_FATAL_WARNINGS=0
      - GSETTINGS_BACKEND=memory
      - QT_LOGGING_RULES=qt.qpa.*=false
      - QT_PLUGIN_PATH=/usr/lib/x86_64-linux-gnu/qt5/plugins
      - LD_LIBRARY_PATH=/usr/lib/x86_64-linux-gnu:/lib/x86_64-linux-gnu

    volumes:
      # Проброс X11 с правильными SELinux метками
      - /tmp/.X11-unix/X0:/tmp/.X11-unix/X0:rw,Z
      - /run/user/1000/bus:/run/user/1000/bus:ro,Z
      - ${HOME}/.max:/root/.config/max:rw,Z
      - ./logs:/root/logs:rw,Z
      - /etc/machine-id:/etc/machine-id:ro
      - /run/user/1000/pulse:/run/user/1000/pulse:ro,Z

    devices:
      - /dev/dri:/dev/dri
      - /dev/snd:/dev/snd

    group_add:
      - audio
      - video

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

    restart: "no"
    stop_signal: SIGTERM
    stop_grace_period: 10s
    init: true

    healthcheck:
      test: ["CMD-SHELL", "pidof max || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
