version: '3.8'

# Изолированная сеть
networks:
  max_isolated_network:
    external: true
    name: max_isolated_network

services:
  max-messenger:
    image: max-messenger:latest
    container_name: max_messenger

    # Сеть с фиксированным IP
    networks:
      max_isolated_network:
        ipv4_address: 172.20.0.100

    # Безопасность
    security_opt:
      - no-new-privileges:true
      - seccomp:./max-messenger/bin/seccomp-max.json
      - apparmor:docker-max-messenger

    # Капабилити (только необходимые)
    cap_add:
      - NET_ADMIN
      - NET_RAW
    cap_drop:
      - ALL

    # Read-only корневая ФС
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=128M
      - /run:rw,noexec,nosuid,size=64M
      - /home/maxuser/.config/max:rw,noexec,nosuid,size=256M

    # Переменные окружения
    environment:
      - DISPLAY=${DISPLAY:-:0}
      - QT_QPA_PLATFORM=xcb
      - QT_X11_NO_MITSHM=1
      - LIBGL_ALWAYS_SOFTWARE=0
      - ELECTRON_NO_SANDBOX=1
      - SECRETS_SERVICE_IGNORE=1
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all

    # Тома (монтирование)
    volumes:
      - /tmp/.X11-unix/X0:/tmp/.X11-unix/X0:ro
      - ${HOME}/.max:/home/maxuser/.config/max:rw
      - ./logs:/home/maxuser/logs:rw

    # GPU (если есть)
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

    # Политики
    restart: "no"
    stop_signal: SIGTERM
    stop_grace_period: 10s
